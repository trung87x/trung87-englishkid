<!DOCTYPE html>
<html lang="vi" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EnglishKid — Tra cứu Grade 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="color-scheme" content="light dark" />
    <style>
      html {
        scroll-behavior: smooth;
      }
      /* Simple dropdown shadow fix for overflow */
      .overlay {
        position: relative;
        z-index: 10;
      }
    </style>
  </head>
  <body
    class="min-h-full bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100"
  >
    <!-- Header -->
    <header
      class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-white/70 dark:supports-[backdrop-filter]:bg-slate-950/70 border-b border-slate-200 dark:border-slate-800"
    >
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
        <a href="#/" class="font-bold text-lg">EnglishKid</a>
        <nav class="ml-auto flex items-center gap-1 text-sm">
          <a
            href="#/browse/topic"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >Topic</a
          >
          <a
            href="#/browse/a-z"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >A–Z</a
          >
          <a
            href="#/browse/tags"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >Tags</a
          >
        </nav>
      </div>
    </header>

    <!-- Main -->
    <main id="app" class="max-w-6xl mx-auto px-4 py-6"></main>

    <!-- Templates (inline) -->
    <template id="tpl-home">
      <section class="grid gap-6">
        <div class="text-center py-8">
          <h1 class="text-2xl md:text-3xl font-semibold">
            Tra cứu từ vựng Grade 1
          </h1>
          <p class="text-slate-600 dark:text-slate-400 mt-1">
            Duyệt theo Topic, A–Z, Tags, hoặc tìm kiếm nhanh EN/VI.
          </p>
        </div>
        <div id="searchBoxContainer"></div>
        <div class="grid sm:grid-cols-3 gap-4">
          <a
            href="#/browse/topic"
            class="group rounded-2xl border border-slate-200 dark:border-slate-800 p-5 hover:shadow-sm transition"
          >
            <div class="text-xl font-medium">Browse theo Topic</div>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
              Chủ đề: animals, school, home…
            </p>
          </a>
          <a
            href="#/browse/a-z"
            class="group rounded-2xl border border-slate-200 dark:border-slate-800 p-5 hover:shadow-sm transition"
          >
            <div class="text-xl font-medium">Browse theo A–Z</div>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
              Danh mục theo chữ cái đầu.
            </p>
          </a>
          <a
            href="#/browse/tags"
            class="group rounded-2xl border border-slate-200 dark:border-slate-800 p-5 hover:shadow-sm transition"
          >
            <div class="text-xl font-medium">Browse theo Tags</div>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
              Độ khó, ngữ cảnh, tùy chọn.
            </p>
          </a>
        </div>
      </section>
    </template>

    <template id="tpl-browse">
      <section class="grid gap-5">
        <div id="searchBoxContainer"></div>
        <div class="flex flex-wrap items-center gap-2 text-sm">
          <span class="text-slate-500">Bộ lọc:</span>
          <select id="fPos" class="px-3 py-2 rounded border bg-transparent">
            <option value="">POS (tất cả)</option>
          </select>
          <select id="fTopic" class="px-3 py-2 rounded border bg-transparent">
            <option value="">Topic (tất cả)</option>
          </select>
          <select id="fTag" class="px-3 py-2 rounded border bg-transparent">
            <option value="">Tag (tất cả)</option>
          </select>
          <select
            id="sort"
            class="ml-auto px-3 py-2 rounded border bg-transparent"
          >
            <option value="az">Sắp xếp A–Z</option>
            <option value="za">Sắp xếp Z–A</option>
          </select>
        </div>
        <div id="container"></div>
      </section>
    </template>

    <template id="tpl-list">
      <div>
        <div
          id="list"
          class="divide-y divide-slate-200 dark:divide-slate-800 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden"
        ></div>
        <div class="text-center mt-4">
          <button
            id="btnMore"
            class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800"
          >
            Tải thêm
          </button>
        </div>
      </div>
    </template>

    <!-- Core Script: data + search + ui (in one file) -->
    <script>
      // ------------------------
      // Utils
      // ------------------------
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
      const debounce = (fn, ms = 150) => {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), ms);
        };
      };

      // Remove Vietnamese diacritics + normalize
      const VIET_MAP = {
        a: /[àáạảãâầấậẩẫăằắặẳẵ]/g,
        A: /[ÀÁẠẢÃÂẦẤẬẨẪĂẰẮẶẲẴ]/g,
        e: /[èéẹẻẽêềếệểễ]/g,
        E: /[ÈÉẸẺẼÊỀẾỆỂỄ]/g,
        i: /[ìíịỉĩ]/g,
        I: /[ÌÍỊỈĨ]/g,
        o: /[òóọỏõôồốộổỗơờớợởỡ]/g,
        O: /[ÒÓỌỎÕÔỒỐỘỔỖƠỜỚỢỞỠ]/g,
        u: /[ùúụủũưừứựửữ]/g,
        U: /[ÙÚỤỦŨƯỪỨỰỬỮ]/g,
        y: /[ỳýỵỷỹ]/g,
        Y: /[ỲÝỴỶỸ]/g,
        d: /[đ]/g,
        D: /[Đ]/g,
      };
      function normalize(str = "") {
        let s = (str + "").trim();
        for (const k in VIET_MAP) s = s.replace(VIET_MAP[k], k);
        return s.toLowerCase();
      }

      // Basic Levenshtein distance (cap early if >1)
      function lev1(a, b) {
        if (Math.abs(a.length - b.length) > 1) return 9;
        // Only need to know if <=1
        let i = 0,
          j = 0,
          edits = 0;
        while (i < a.length && j < b.length) {
          if (a[i] === b[j]) {
            i++;
            j++;
            continue;
          }
          edits++;
          if (edits > 1) return 9;
          if (a.length > b.length) i++;
          else if (a.length < b.length) j++;
          else {
            i++;
            j++;
          }
        }
        if (i < a.length || j < b.length) edits++;
        return edits;
      }

      // ------------------------
      // Data loading & indexing
      // ------------------------
      const DB = { raw: [], words: [], topics: [], tags: [], pos: [] };
      const INDEX = { byWord: new Map(), trie: {} };

      async function loadData() {
        const res = await fetch("./public/data/grade-1-full.json");
        if (!res.ok) throw new Error("Không tải được grade-1-full.json");
        const data = await res.json();
        // Expect: { categories:[ {name, items:[{word, meaning_vi, pos, topics, tags, ...}]} ] } OR flat array
        let items = [];
        if (Array.isArray(data)) items = data;
        else if (data.categories) {
          for (const c of data.categories || [])
            for (const it of c.items || []) items.push(it);
        } else if (data.items) items = data.items;
        else items = [];

        // Normalize + pick minimal fields
        DB.raw = items
          .map((it, idx) => ({
            id: it.id || `w_${idx + 1}`,
            slug: it.slug || (it.word || "").toLowerCase(),
            word: it.word || "",
            meaning_vi: it.meaning_vi || it.meaning || "",
            pos: it.pos || "",
            topics: it.topics || it.topic || [],
            tags: it.tags || [],
          }))
          .filter((x) => x.word && x.meaning_vi);

        // Facets
        DB.pos = [...new Set(DB.raw.map((x) => x.pos).filter(Boolean))].sort();
        DB.topics = [...new Set(DB.raw.flatMap((x) => x.topics || []))].sort();
        DB.tags = [...new Set(DB.raw.flatMap((x) => x.tags || []))].sort();

        // Build simple word map + trie for autocomplete
        for (const x of DB.raw) {
          const key = normalize(x.word);
          INDEX.byWord.set(key, (INDEX.byWord.get(key) || []).concat([x]));
          insertTrie(key);
        }
        DB.words = DB.raw; // alias
      }

      function insertTrie(word) {
        let node = INDEX.trie;
        for (const ch of word) {
          node[ch] = node[ch] || {};
          node = node[ch];
        }
        node.$ = true; // terminal
      }

      function trieSuggest(prefix, limit = 8) {
        let node = INDEX.trie;
        for (const ch of prefix) {
          node = node[ch];
          if (!node) return [];
        }
        const out = [];
        const buf = [];
        const dfs = (n) => {
          if (out.length >= limit) return;
          if (n.$) out.push(buf.join(""));
          for (const k of Object.keys(n))
            if (k !== "$") {
              buf.push(k);
              dfs(n[k]);
              buf.pop();
            }
        };
        dfs(node);
        return out.map((s) => prefix + s);
      }

      // ------------------------
      // Search & filter
      // ------------------------
      function parseQuery(q) {
        const tokens = (q || "").trim().split(/\s+/).filter(Boolean);
        const cond = { text: [], pos: [], topic: [], tag: [] };
        for (const t of tokens) {
          if (t.startsWith("pos:")) cond.pos.push(t.slice(4));
          else if (t.startsWith("topic:")) cond.topic.push(t.slice(6));
          else if (t.startsWith("tag:")) cond.tag.push(t.slice(4));
          else if (t.startsWith("word:")) cond.text.push(t.slice(5));
          else if (t.startsWith("vi:")) cond.text.push(t.slice(3));
          else cond.text.push(t);
        }
        return cond;
      }

      function search(query, facets) {
        const cond = parseQuery(query || "");
        const ntext = normalize(cond.text.join(" "));
        const fpos = facets.pos || "";
        const ftopic = facets.topic || "";
        const ftag = facets.tag || "";
        let out = DB.words.filter((x) => {
          if (fpos && x.pos !== fpos) return false;
          if (ftopic && !(x.topics || []).includes(ftopic)) return false;
          if (ftag && !(x.tags || []).includes(ftag)) return false;
          if (!ntext) return true;
          const w = normalize(x.word);
          const m = normalize(x.meaning_vi || "");
          if (w.includes(ntext) || m.includes(ntext)) return true;
          // fuzzy word: allow edit distance <=1 for prefix-like query up to length 12
          const target = w.slice(0, Math.max(ntext.length, 1));
          return lev1(ntext, target) <= 1;
        });
        return out;
      }

      // ------------------------
      // UI: Search box with autocomplete
      // ------------------------
      function mountSearchBox(root) {
        root.innerHTML = `
          <div class="overlay">
            <div class="relative">
              <input id="q" type="text" placeholder="Tìm EN/VI… hỗ trợ pos:, topic:, tag:"
                class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500"/>
              <div id="ac" class="absolute mt-1 left-0 right-0 hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-lg max-h-80 overflow-auto"></div>
            </div>
          </div>`;
        const input = $("#q", root);
        const ac = $("#ac", root);

        const renderAC = (items) => {
          if (!items.length) {
            ac.classList.add("hidden");
            ac.innerHTML = "";
            return;
          }
          ac.classList.remove("hidden");
          ac.innerHTML = items
            .map(
              (s) =>
                `<button type="button" class="w-full text-left px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800">${s}</button>`
            )
            .join("");
          $$("#ac button", root).forEach((btn) =>
            btn.addEventListener("click", () => {
              input.value = btn.textContent;
              goResults(input.value);
            })
          );
        };

        const onInput = debounce(() => {
          const v = normalize(input.value);
          if (!v) {
            renderAC([]);
            return;
          }
          const pref = v.split(/\s+/).pop(); // last token for word suggest
          const sugg = pref ? trieSuggest(pref, 8) : [];
          renderAC(sugg);
        }, 150);

        input.addEventListener("input", onInput);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            goResults(input.value);
          }
        });
      }

      // ------------------------
      // UI: List (with load-more)
      // ------------------------
      function renderList(container, items) {
        const tpl = document.importNode($("#tpl-list").content, true);
        const listEl = $("#list", tpl);
        const btn = $("#btnMore", tpl);
        let page = 0;
        const SIZE = 50;

        function renderChunk() {
          const slice = items.slice(page * SIZE, (page + 1) * SIZE);
          const html = slice
            .map(
              (x) => `
            <div class="p-3 grid grid-cols-[1fr_auto] gap-2 hover:bg-slate-50 dark:hover:bg-slate-900/50">
              <div>
                <div class="font-medium">${
                  x.word
                } <span class="text-xs text-slate-500">· ${
                x.pos || "—"
              }</span></div>
                <div class="text-sm text-slate-600 dark:text-slate-400 line-clamp-1">${
                  x.meaning_vi
                }</div>
                <div class="mt-1 text-xs text-slate-500">${(
                  x.topics || []
                ).join(", ")} ${
                x.tags?.length ? " · " + x.tags.join(", ") : ""
              }</div>
              </div>
              <div class="text-xs text-slate-500 self-center">${(
                x.word[0] || ""
              ).toUpperCase()}</div>
            </div>`
            )
            .join("");
          listEl.insertAdjacentHTML("beforeend", html);
          page++;
          if (page * SIZE >= items.length) btn.classList.add("hidden");
        }

        btn.addEventListener("click", renderChunk);
        renderChunk();
        container.innerHTML = "";
        container.appendChild(tpl);
      }

      // ------------------------
      // Browse pages
      // ------------------------
      function pageBrowse(type) {
        const root = document.importNode($("#tpl-browse").content, true);
        // mount search
        mountSearchBox($("#searchBoxContainer", root));
        const fPos = $("#fPos", root);
        const fTopic = $("#fTopic", root);
        const fTag = $("#fTag", root);
        const sortSel = $("#sort", root);
        // populate facets
        for (const p of DB.pos)
          fPos.insertAdjacentHTML(
            "beforeend",
            `<option value="${p}">${p}</option>`
          );
        for (const t of DB.topics)
          fTopic.insertAdjacentHTML(
            "beforeend",
            `<option value="${t}">${t}</option>`
          );
        for (const g of DB.tags)
          fTag.insertAdjacentHTML(
            "beforeend",
            `<option value="${g}">${g}</option>`
          );

        const container = $("#container", root);

        // initial dataset by type
        let base = DB.words;
        if (type === "topic") {
          // grid topics
          const grid = document.createElement("div");
          grid.className = "grid sm:grid-cols-2 md:grid-cols-3 gap-3";
          for (const t of DB.topics) {
            const count = DB.words.filter((x) => x.topics?.includes(t)).length;
            const a = document.createElement("a");
            a.href = "javascript:void(0)";
            a.className =
              "rounded-xl border border-slate-200 dark:border-slate-800 p-4 hover:bg-slate-50 dark:hover:bg-slate-900/40";
            a.innerHTML = `<div class="font-medium">${t}</div><div class="text-sm text-slate-500">${count} từ</div>`;
            a.addEventListener("click", () => {
              fTopic.value = t;
              apply();
            });
            grid.appendChild(a);
          }
          container.appendChild(grid);
        }
        if (type === "a-z") {
          const letters = [
            ...new Set(
              DB.words.map((x) => x.word[0]?.toUpperCase()).filter(Boolean)
            ),
          ].sort();
          const nav = document.createElement("div");
          nav.className = "flex flex-wrap gap-1 mb-2";
          for (const L of letters) {
            const btn = document.createElement("button");
            btn.className =
              "px-2 py-1 rounded border text-sm hover:bg-slate-50 dark:hover:bg-slate-800";
            btn.textContent = L;
            btn.addEventListener("click", () => {
              current = DB.words.filter((x) => x.word[0]?.toUpperCase() === L);
              render();
            });
            nav.appendChild(btn);
          }
          container.appendChild(nav);
        }
        if (type === "tags") {
          const grid = document.createElement("div");
          grid.className = "flex flex-wrap gap-2";
          for (const tag of DB.tags) {
            const btn = document.createElement("button");
            btn.className =
              "px-3 py-1.5 rounded-full border text-sm hover:bg-slate-50 dark:hover:bg-slate-800";
            btn.textContent = `#${tag}`;
            btn.addEventListener("click", () => {
              fTag.value = tag;
              apply();
            });
            grid.appendChild(btn);
          }
          container.appendChild(grid);
        }

        // dynamic list zone
        const listZone = document.createElement("div");
        listZone.className = "mt-3";
        container.appendChild(listZone);

        let current = base;
        function apply() {
          const facets = {
            pos: fPos.value,
            topic: fTopic.value,
            tag: fTag.value,
          };
          current = search("", facets);
          render();
        }
        function render() {
          const sorted = [...current].sort((a, b) =>
            sortSel.value === "az"
              ? a.word.localeCompare(b.word)
              : b.word.localeCompare(a.word)
          );
          renderList(listZone, sorted);
        }

        fPos.addEventListener("change", apply);
        fTopic.addEventListener("change", apply);
        fTag.addEventListener("change", apply);
        sortSel.addEventListener("change", render);

        // first paint list (unfiltered)
        render();
        return root;
      }

      // ------------------------
      // Home & Results pages
      // ------------------------
      function pageHome() {
        const root = document.importNode($("#tpl-home").content, true);
        mountSearchBox($("#searchBoxContainer", root));
        return root;
      }

      function goResults(q) {
        location.hash = `#/results?q=${encodeURIComponent(q || "")}`;
      }

      function pageResults(params) {
        const root = document.createElement("section");
        root.className = "grid gap-4";
        // search box
        const sb = document.createElement("div");
        mountSearchBox(sb);
        root.appendChild(sb);
        // filters bar (same as browse but simpler)
        const bar = document.createElement("div");
        bar.className = "flex flex-wrap items-center gap-2 text-sm";
        bar.innerHTML = `
          <span class="text-slate-500">Bộ lọc:</span>
          <select id="fPosR" class="px-3 py-2 rounded border bg-transparent"><option value="">POS (tất cả)</option></select>
          <select id="fTopicR" class="px-3 py-2 rounded border bg-transparent"><option value="">Topic (tất cả)</option></select>
          <select id="fTagR" class="px-3 py-2 rounded border bg-transparent"><option value="">Tag (tất cả)</option></select>
          <select id="sortR" class="ml-auto px-3 py-2 rounded border bg-transparent"><option value="az">Sắp xếp A–Z</option><option value="za">Sắp xếp Z–A</option></select>`;
        root.appendChild(bar);
        const listZone = document.createElement("div");
        root.appendChild(listZone);

        const fPos = $("#fPosR", bar),
          fTopic = $("#fTopicR", bar),
          fTag = $("#fTagR", bar),
          sortSel = $("#sortR", bar);
        for (const p of DB.pos)
          fPos.insertAdjacentHTML(
            "beforeend",
            `<option value="${p}">${p}</option>`
          );
        for (const t of DB.topics)
          fTopic.insertAdjacentHTML(
            "beforeend",
            `<option value="${t}">${t}</option>`
          );
        for (const g of DB.tags)
          fTag.insertAdjacentHTML(
            "beforeend",
            `<option value="${g}">${g}</option>`
          );

        function render() {
          const facets = {
            pos: fPos.value,
            topic: fTopic.value,
            tag: fTag.value,
          };
          const items = search(params.q || "", facets);
          const sorted = items.sort((a, b) =>
            sortSel.value === "az"
              ? a.word.localeCompare(b.word)
              : b.word.localeCompare(a.word)
          );
          renderList(listZone, sorted);
        }
        fPos.addEventListener("change", render);
        fTopic.addEventListener("change", render);
        fTag.addEventListener("change", render);
        sortSel.addEventListener("change", render);

        render();
        return root;
      }

      // ------------------------
      // Tiny hash router
      // ------------------------
      async function router() {
        const app = document.getElementById("app");
        const [hash, queryString] = location.hash.split("?");
        const params = Object.fromEntries(
          new URLSearchParams(queryString || "")
        );
        if (!DB.raw.length) {
          try {
            await loadData();
          } catch (e) {
            app.innerHTML = `<div class='p-6 rounded-xl bg-rose-50 text-rose-700 dark:bg-rose-950 dark:text-rose-300'>${e.message}</div>`;
            return;
          }
        }

        app.innerHTML = "";
        let view;
        switch (hash) {
          case "#/browse/topic":
            view = pageBrowse("topic");
            break;
          case "#/browse/a-z":
            view = pageBrowse("a-z");
            break;
          case "#/browse/tags":
            view = pageBrowse("tags");
            break;
          case "#/results":
            view = pageResults(params);
            break;
          default:
            view = pageHome();
        }
        app.appendChild(view);
      }

      window.addEventListener("hashchange", router);
      router();
    </script>
  </body>
</html>
