<!DOCTYPE html>
<html lang="vi" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EnglishKid — Tra cứu Grade 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="min-h-full bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100"
  >
    <header
      class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-white/70 dark:supports-[backdrop-filter]:bg-slate-950/70 border-b border-slate-200 dark:border-slate-800"
    >
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
        <a href="#/" class="font-bold text-lg">EnglishKid</a>
        <nav class="ml-auto flex items-center gap-1 text-sm">
          <a
            href="#/browse/topic"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >Topic</a
          >
          <a
            href="#/browse/a-z"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >A–Z</a
          >
          <a
            href="#/browse/tags"
            class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
            >Tags</a
          >
        </nav>
      </div>
    </header>

    <main id="app" class="mx-auto max-w-[768px] px-3 py-3"></main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
